{% extends "base.html" %}

{% block title %}Login - HealthRisk Monitor{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-75 align-items-center py-5">
        <div class="col-md-6 col-lg-5" data-aos="fade-up">
            <div class="text-center mb-4">
                <div class="rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center float" style="width: 80px; height: 80px; background: var(--pastel-purple);">
                    <i class="fas fa-leaf fa-2x" style="color: var(--pastel-purple-dark);"></i>
                </div>
                <h2 class="fw-bold">Welcome Back!</h2>
                <p class="text-muted">Login to access your health dashboard</p>
            </div>
            
            <div class="card border-0 shadow-lg">
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <!-- Email Field -->
                        <div class="mb-4" data-aos="fade-up" data-aos-delay="100">
                            <label for="email" class="form-label">
                                <i class="fas fa-envelope me-2" style="color: var(--pastel-purple-dark);"></i>
                                Email Address
                            </label>
                            <input type="email" 
                                   class="form-control form-control-lg" 
                                   id="email" 
                                   name="email" 
                                   required 
                                   placeholder="Enter your email"
                                   style="border: 2px solid var(--pastel-purple); border-radius: var(--radius-lg);">
                        </div>
                        
                        <!-- Password Field -->
                        <div class="mb-4" data-aos="fade-up" data-aos-delay="200">
                            <label for="password" class="form-label">
                                <i class="fas fa-lock me-2" style="color: var(--pastel-purple-dark);"></i>
                                Password
                            </label>
                            <input type="password" 
                                   class="form-control form-control-lg" 
                                   id="password" 
                                   name="password" 
                                   required 
                                   placeholder="Enter your password"
                                   style="border: 2px solid var(--pastel-purple); border-radius: var(--radius-lg);">
                        </div>
                        
                        <!-- Remember Me -->
                        <div class="mb-4" data-aos="fade-up" data-aos-delay="300">
                            <div class="form-check">
                                <input type="checkbox" 
                                       class="form-check-input" 
                                       id="remember" 
                                       name="remember"
                                       style="border-color: var(--pastel-purple-dark);">
                                <label class="form-check-label" for="remember">
                                    Remember me
                                </label>
                            </div>
                        </div>
                        
                        <!-- Submit Button -->
                        <div class="d-grid" data-aos="fade-up" data-aos-delay="400">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-sign-in-alt me-2"></i>
                                Login
                            </button>
                        </div>
                    </form>
                </div>
                
                <div class="card-footer bg-transparent border-0 text-center pb-4">
                    <p class="mb-0">
                        Don't have an account? 
                        <a href="{{ url_for('auth.register') }}" style="color: var(--pastel-purple-dark); font-weight: 600;">
                            Register here
                        </a>
                    </p>
                </div>
            </div>
            
            <!-- Decorative Elements -->
            <div class="position-relative">
                <div class="position-absolute top-0 start-0 translate-middle" style="z-index: -1;">
                    <i class="fas fa-circle fa-3x" style="color: var(--pastel-purple); opacity: 0.2;"></i>
                </div>
                <div class="position-absolute bottom-0 end-0 translate-middle" style="z-index: -1;">
                    <i class="fas fa-square fa-3x" style="color: var(--pastel-pink); opacity: 0.2;"></i>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
